<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>高智商 AI 版 - 網頁象棋</title>
    <style>
        body {
            font-family: "Microsoft JhengHei", Arial, sans-serif;
            background-color: #f0f0f0; display: flex; flex-direction: column;
            align-items: center; margin: 0; padding: 20px;
        }
        #game-container { display: flex; flex-direction: column; align-items: center; }
        .status {
            font-size: 24px; font-weight: bold; margin-bottom: 20px;
            background: #fff; padding: 10px 30px; border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            transition: background-color 0.3s;
        }
        .thinking { background: #ffeaa7; color: #d35400 !important; } /* AI思考時的背景色 */
        
        .board {
            display: grid; grid-template-columns: repeat(9, 60px); grid-template-rows: repeat(10, 60px);
            background-color: #e3c498; padding: 20px; position: relative;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3); border-radius: 5px;
        }
        .board-border {
            position: absolute; top: 50px; left: 50px; width: 480px; height: 540px;
            border: 3px solid #333; pointer-events: none; z-index: 1;
        }
        .river-text {
            position: absolute; top: 290px; left: 50px; width: 480px; height: 60px;
            display: flex; justify-content: center; align-items: center;
            font-size: 28px; font-family: "KaiTi", "標楷體", serif;
            letter-spacing: 40px; color: #444; pointer-events: none; z-index: 1;
        }
        .cell {
            width: 60px; height: 60px; display: flex; justify-content: center;
            align-items: center; position: relative; z-index: 2;
        }
        .cell::before {
            content: ""; position: absolute; top: 50%; left: 50%;
            width: 100%; height: 100%; border-top: 1px solid #7a5e3a; border-left: 1px solid #7a5e3a;
            box-sizing: border-box; z-index: -1;
        }
        .cell[data-c="8"]::before { border-top: none; }
        .cell[data-r="9"]::before { border-left: none; }
        .cell[data-r="4"]::before { border-left: none; }
        .diag-right::after {
            content: ""; position: absolute; top: 50%; left: 50%;
            width: 282.84%; height: 1px; background-color: #7a5e3a;
            transform-origin: left top; transform: rotate(45deg); z-index: -1;
        }
        .diag-left::after {
            content: ""; position: absolute; top: 50%; left: 50%;
            width: 282.84%; height: 1px; background-color: #7a5e3a;
            transform-origin: left top; transform: rotate(135deg); z-index: -1;
        }
        .piece {
            width: 50px; height: 50px; border-radius: 50%; background-color: #ffebcd;
            border: 2px solid #333; display: flex; justify-content: center; align-items: center;
            font-size: 24px; font-family: "KaiTi", "標楷體", serif; font-weight: bold; cursor: pointer;
            box-shadow: 2px 2px 4px rgba(0,0,0,0.4); user-select: none; z-index: 10;
            transition: transform 0.1s;
        }
        .piece.red { color: #c00; border-color: #c00; }
        .piece.black { color: #000; border-color: #000; }
        .piece.selected { box-shadow: 0 0 12px 4px #00f; transform: translateY(-5px) scale(1.1); }

        #animation-overlay {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: transparent; display: none; justify-content: center; align-items: center; z-index: 9999;
        }
        #animation-img, #animation-video {
            max-width: 90%; max-height: 90%; outline: none; background: transparent;
            opacity: 0; transform: scale(0.3); pointer-events: none; display: none;
        }
        
        #game-over-overlay {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: rgba(255,255,255,0.9); display: none; flex-direction: column;
            justify-content: center; align-items: center; z-index: 10000;
        }
        #game-over-text { font-size: 40px; font-weight: bold; margin-bottom: 20px; text-align: center; }
        #restart-btn {
            font-size: 20px; padding: 10px 30px; cursor: pointer; background: #c00; color: #fff;
            border: none; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.2);
        }

        .video-zoom-in { animation: zoomIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
        .video-zoom-out { animation: zoomOut 0.2s ease-in forwards; }
        @keyframes zoomIn { 0% { transform: scale(0.3); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
        @keyframes zoomOut { 0% { transform: scale(1); opacity: 1; } 100% { transform: scale(0.3); opacity: 0; } }
    </style>
</head>
<body>

    <div id="game-container">
        <div class="status" id="status-text">目前輪到：紅方 (玩家)</div>
        <p style="font-size: 14px; color: #666; margin-top: -10px; margin-bottom: 20px;">
            裝載 Minimax 引擎：AI 現在擁有預判未來的能力，會計算陷阱與反擊！
        </p>
        
        <div class="board" id="board">
            <div class="board-border"></div>
            <div class="river-text">楚 河 漢 界</div>
        </div>
    </div>

    <div id="animation-overlay">
        <img id="animation-img" alt="透明GIF反殺">
        <video id="animation-video" playsinline></video>
    </div>

    <div id="game-over-overlay">
        <div id="game-over-text">紅方 獲勝！</div>
        <button id="restart-btn" onclick="location.reload()">重新開始</button>
    </div>

    <script>
        let boardState = [
            ['b車', 'b馬', 'b象', 'b士', 'b將', 'b士', 'b象', 'b馬', 'b車'],
            ['', '', '', '', '', '', '', '', ''],
            ['', 'b炮', '', '', '', '', '', 'b炮', ''],
            ['b卒', '', 'b卒', '', 'b卒', '', 'b卒', '', 'b卒'],
            ['', '', '', '', '', '', '', '', ''],
            ['', '', '', '', '', '', '', '', ''],
            ['r兵', '', 'r兵', '', 'r兵', '', 'r兵', '', 'r兵'],
            ['', 'r炮', '', '', '', '', '', 'r炮', ''],
            ['', '', '', '', '', '', '', '', ''],
            ['r車', 'r馬', 'r象', 'r士', 'r帥', 'r士', 'r象', 'r馬', 'r車']
        ];

        let selectedCell = null;
        let currentTurn = 'r';
        let isGameOver = false;
        let aiMoveCount = 0;

        const boardElement = document.getElementById('board');
        const statusText = document.getElementById('status-text');

        const pieceValues = {
            '帥': 20000, '將': 20000, // 提高主帥價值，AI會拼死保衛
            '車': 1000,
            '炮': 500,
            '馬': 450,
            '象': 200, '相': 200,
            '士': 200,
            '兵': 100, '卒': 100
        };

        function renderBoard() {
            boardElement.innerHTML = `
                <div class="board-border"></div>
                <div class="river-text">楚 河 漢 界</div>
            `;
            
            for (let r = 0; r < 10; r++) {
                for (let c = 0; c < 9; c++) {
                    const cell = document.createElement('div');
                    cell.className = 'cell';
                    cell.dataset.r = r; cell.dataset.c = c;
                    
                    if ((r === 0 && c === 3) || (r === 7 && c === 3)) cell.classList.add('diag-right');
                    if ((r === 0 && c === 5) || (r === 7 && c === 5)) cell.classList.add('diag-left');

                    const pieceData = boardState[r][c];
                    if (pieceData) {
                        const piece = document.createElement('div');
                        const side = pieceData.charAt(0);
                        const name = pieceData.charAt(1);
                        piece.className = `piece ${side === 'r' ? 'red' : 'black'}`;
                        if (selectedCell && selectedCell.r === r && selectedCell.c === c) {
                            piece.classList.add('selected');
                        }
                        piece.innerText = name;
                        cell.appendChild(piece);
                    }

                    cell.addEventListener('click', () => handleCellClick(r, c, true));
                    boardElement.appendChild(cell);
                }
            }
        }

        function isValidMove(board, sr, sc, er, ec, side, pieceType) {
            if (board[er][ec] && board[er][ec].charAt(0) === side) return false;
            const dr = Math.abs(er - sr); const dc = Math.abs(ec - sc);
            function countPiecesBetween() {
                let count = 0;
                if (sr === er) { for (let i = Math.min(sc, ec) + 1; i < Math.max(sc, ec); i++) if (board[sr][i]) count++; }
                else if (sc === ec) { for (let i = Math.min(sr, er) + 1; i < Math.max(sr, er); i++) if (board[i][sc]) count++; }
                return count;
            }
            switch (pieceType) {
                case '將': case '帥':
                    if (dr + dc !== 1) return false;
                    if (ec < 3 || ec > 5) return false;
                    if (side === 'r' && er < 7) return false;
                    if (side === 'b' && er > 2) return false;
                    return true;
                case '士':
                    if (dr !== 1 || dc !== 1) return false;
                    if (ec < 3 || ec > 5) return false;
                    if (side === 'r' && er < 7) return false;
                    if (side === 'b' && er > 2) return false;
                    return true;
                case '象':
                    if (dr !== 2 || dc !== 2) return false;
                    if (side === 'r' && er < 5) return false;
                    if (side === 'b' && er > 4) return false;
                    if (board[(sr + er) / 2][(sc + ec) / 2]) return false;
                    return true;
                case '馬':
                    if (!((dr === 2 && dc === 1) || (dr === 1 && dc === 2))) return false;
                    if (dr === 2 && board[sr + (er > sr ? 1 : -1)][sc]) return false;
                    if (dc === 2 && board[sr][sc + (ec > sc ? 1 : -1)]) return false;
                    return true;
                case '車':
                    if (sr !== er && sc !== ec) return false;
                    if (countPiecesBetween() > 0) return false;
                    return true;
                case '炮':
                    if (sr !== er && sc !== ec) return false;
                    const piecesInBetween = countPiecesBetween();
                    const targetPiece = board[er][ec];
                    return targetPiece ? piecesInBetween === 1 : piecesInBetween === 0;
                case '兵': case '卒':
                    if (side === 'r') {
                        if (er > sr) return false;
                        if (sr >= 5) return (er === sr - 1 && dc === 0);
                        return (er === sr - 1 && dc === 0) || (sr === er && dc === 1);
                    } else {
                        if (er < sr) return false; 
                        if (sr <= 4) return (er === sr + 1 && dc === 0);
                        return (er === sr + 1 && dc === 0) || (sr === er && dc === 1);
                    }
            }
            return false;
        }

        function isGeneralsFacing(board) {
            let rKing, bKing;
            for (let r = 0; r < 10; r++) {
                for (let c = 0; c < 9; c++) {
                    if (board[r][c] === 'r帥') rKing = { r, c };
                    if (board[r][c] === 'b將') bKing = { r, c };
                }
            }
            if (!rKing || !bKing) return false;
            if (rKing.c !== bKing.c) return false;
            for (let r = bKing.r + 1; r < rKing.r; r++) { if (board[r][rKing.c]) return false; }
            return true;
        }

        function checkIsUnderAttack(board, attackingSide) {
            let defR = -1, defC = -1;
            const defGen = attackingSide === 'r' ? 'b將' : 'r帥';
            for (let r = 0; r < 10; r++) {
                for (let c = 0; c < 9; c++) {
                    if (board[r][c] === defGen) { defR = r; defC = c; }
                }
            }
            if (defR === -1) return false;
            for (let r = 0; r < 10; r++) {
                for (let c = 0; c < 9; c++) {
                    const piece = board[r][c];
                    if (piece && piece.charAt(0) === attackingSide) {
                        if (isValidMove(board, r, c, defR, defC, attackingSide, piece.charAt(1))) return true; 
                    }
                }
            }
            return false;
        }

        function hasOffensivePieces(board, side) {
            const offensiveTypes = ['車', '馬', '炮', '兵', '卒'];
            for (let r = 0; r < 10; r++) {
                for (let c = 0; c < 9; c++) {
                    const piece = board[r][c];
                    if (piece && piece.charAt(0) === side) {
                        if (offensiveTypes.includes(piece.charAt(1))) return true;
                    }
                }
            }
            return false;
        }

        // --- Minimax 專用輔助函數 ---
        // 快速複製盤面 (效能優化)
        function cloneBoard(b) {
            return b.map(row => [...row]);
        }

        // 生成該陣營的所有合法步伐
        function generateAllMoves(board, side) {
            let moves = [];
            const enemySide = side === 'r' ? 'b' : 'r';

            for (let r = 0; r < 10; r++) {
                for (let c = 0; c < 9; c++) {
                    const piece = board[r][c];
                    if (piece && piece.charAt(0) === side) {
                        const type = piece.charAt(1);
                        for (let tr = 0; tr < 10; tr++) {
                            for (let tc = 0; tc < 9; tc++) {
                                if (isValidMove(board, r, c, tr, tc, side, type)) {
                                    let temp = cloneBoard(board);
                                    temp[tr][tc] = piece;
                                    temp[r][c] = '';
                                    // 必須不違規且不能讓自己的主帥送死
                                    if (!isGeneralsFacing(temp) && !checkIsUnderAttack(temp, enemySide)) {
                                        moves.push({ sr: r, sc: c, er: tr, ec: tc });
                                    }
                                }
                            }
                        }
                    }
                }
            }
            return moves;
        }

        // 靜態盤面評估函數 (AI 是黑方，黑方越高分越好)
        function evaluateBoard(board) {
            let score = 0;
            for (let r = 0; r < 10; r++) {
                for (let c = 0; c < 9; c++) {
                    const piece = board[r][c];
                    if (!piece) continue;
                    
                    const side = piece.charAt(0);
                    const type = piece.charAt(1);
                    let val = pieceValues[type];

                    // 陣地附加價值
                    if (type === '卒' || type === '兵') {
                        if ((side === 'b' && r >= 5) || (side === 'r' && r <= 4)) val += 30; // 過河價值提升
                    }
                    if (type === '車') {
                        if (r !== 0 && r !== 9) val += 20; // 車出動
                    }
                    if (type === '馬') {
                        if (r !== 0 && r !== 9) val += 10; // 馬出動
                        const centerDist = Math.abs(c - 4);
                        val += (4 - centerDist) * 3; // 馬越靠中間越強
                    }
                    if (type === '炮' && c === 4) val += 15; // 中炮控制

                    // 結算：黑方加分，紅方扣分
                    if (side === 'b') score += val;
                    else score -= val;
                }
            }
            return score;
        }

        // ★ Minimax 核心演算法 (附帶 Alpha-Beta 剪枝) ★
        function minimax(board, depth, alpha, beta, isMaximizingPlayer) {
            // 到達深度極限，直接回傳當前盤面分數
            if (depth === 0) return evaluateBoard(board);

            const side = isMaximizingPlayer ? 'b' : 'r';
            const moves = generateAllMoves(board, side);

            // 如果沒有步可以走 (被將死)，直接回傳極值
            if (moves.length === 0) {
                return isMaximizingPlayer ? -99999 : 99999;
            }

            if (isMaximizingPlayer) {
                let maxEval = -Infinity;
                for (let move of moves) {
                    let tempBoard = cloneBoard(board);
                    // AI 的思考中，假設吃子必定成功 (極度貪婪與侵略)
                    tempBoard[move.er][move.ec] = tempBoard[move.sr][move.sc];
                    tempBoard[move.sr][move.sc] = '';

                    let ev = minimax(tempBoard, depth - 1, alpha, beta, false);
                    maxEval = Math.max(maxEval, ev);
                    alpha = Math.max(alpha, ev);
                    if (beta <= alpha) break; // Alpha-Beta 剪枝：這條路線太爛，不用算了
                }
                return maxEval;
            } else {
                let minEval = Infinity;
                for (let move of moves) {
                    let tempBoard = cloneBoard(board);
                    tempBoard[move.er][move.ec] = tempBoard[move.sr][move.sc];
                    tempBoard[move.sr][move.sc] = '';

                    let ev = minimax(tempBoard, depth - 1, alpha, beta, true);
                    minEval = Math.min(minEval, ev);
                    beta = Math.min(beta, ev);
                    if (beta <= alpha) break; // Alpha-Beta 剪枝
                }
                return minEval;
            }
        }

        // --- AI 啟動入口 ---
        function playAITurn() {
            if (isGameOver || currentTurn !== 'b') return;

            // 改變 UI 狀態，提示玩家 AI 正在計算未來
            statusText.innerText = "目前輪到：黑方 (AI 深度預判中...)";
            statusText.classList.add('thinking');

            // 使用 setTimeout 讓瀏覽器有時間先渲染上面的文字，再進入阻斷式的運算
            setTimeout(() => {
                let bestMove = null;
                let bestValue = -Infinity;
                
                // 開局庫：前兩步還是照搬大師套路，省下運算資源並穩固陣地
                if (aiMoveCount === 0) {
                    const openings = [
                        { sr: 2, sc: 1, er: 2, ec: 4 }, // 左炮平中
                        { sr: 2, sc: 7, er: 2, ec: 4 }, // 右炮平中
                        { sr: 0, sc: 1, er: 2, ec: 2 }, // 左馬正起
                        { sr: 0, sc: 7, er: 2, ec: 6 }  // 右馬正起
                    ];
                    openings.sort(() => Math.random() - 0.5);
                    for (let op of openings) {
                        if (isValidMove(boardState, op.sr, op.sc, op.er, op.ec, 'b', boardState[op.sr][op.sc].charAt(1))) {
                            bestMove = op;
                            break;
                        }
                    }
                }

                // 如果不是第一步，或者開局庫無法使用，啟動 Minimax 搜尋！
                if (!bestMove) {
                    const moves = generateAllMoves(boardState, 'b');
                    // 打亂陣列，當分數一樣時 AI 走法才不會死板
                    moves.sort(() => Math.random() - 0.5);

                    for (let move of moves) {
                        let tempBoard = cloneBoard(boardState);
                        tempBoard[move.er][move.ec] = tempBoard[move.sr][move.sc];
                        tempBoard[move.sr][move.sc] = '';

                        // ★ 深度設定：depth = 1 代表預判「AI 走完 -> 玩家走一步 -> 評價結果」
                        // 雖然寫的是 1，但實質上就是看透了「未來的 2 個回合交替」
                        let boardValue = minimax(tempBoard, 2, -Infinity, Infinity, false);

                        if (boardValue > bestValue) {
                            bestValue = boardValue;
                            bestMove = move;
                        }
                    }
                }

                // 恢復 UI 狀態
                statusText.classList.remove('thinking');

                if (bestMove) {
                    selectedCell = { r: bestMove.sr, c: bestMove.sc };
                    renderBoard();
                    setTimeout(() => {
                        aiMoveCount++; 
                        handleCellClick(bestMove.er, bestMove.ec, false); 
                    }, 400); // 動作演示停頓
                } else {
                    isGameOver = true;
                    const overOverlay = document.getElementById('game-over-overlay');
                    const textEl = document.getElementById('game-over-text');
                    textEl.innerText = `🏆 紅方 獲勝！\n(黑方已被將死)`;
                    textEl.style.color = '#c00';
                    overOverlay.style.display = 'flex';
                }
            }, 50); // 讓 UI 刷新
        }

        // --- 動畫與點擊核心 ---
        function playGif(filename, duration, fallbackAlertText, callback) {
            const overlay = document.getElementById('animation-overlay');
            const img = document.getElementById('animation-img');
            const video = document.getElementById('animation-video');
            
            video.style.display = 'none';
            img.style.display = 'block';
            overlay.style.backgroundColor = 'transparent'; 

            const url = `./animations/${filename}`;

            img.onload = null; img.onerror = null;

            img.onload = function() {
                overlay.style.display = 'flex';
                img.className = 'video-zoom-in'; 
                setTimeout(() => {
                    img.className = 'video-zoom-out';
                    setTimeout(() => {
                        overlay.style.display = 'none';
                        img.className = ''; 
                        img.onload = null; img.onerror = null;
                        img.src = ''; 
                        callback();
                    }, 200); 
                }, duration);
            };

            img.onerror = function() {
                console.log(fallbackAlertText); 
                overlay.style.display = 'none';
                img.onload = null; img.onerror = null;
                callback();
            };

            img.src = url;
        }

        function playVideo(filename, fallbackAlertText, callback) {
            const overlay = document.getElementById('animation-overlay');
            const video = document.getElementById('animation-video');
            const img = document.getElementById('animation-img');
            
            img.style.display = 'none';
            video.style.display = 'block';
            overlay.style.backgroundColor = 'rgba(0,0,0,0.8)'; 

            const url = `./animations/${filename}`;

            video.onloadeddata = null; video.onended = null; video.onerror = null;

            video.onloadeddata = function() {
                overlay.style.display = 'flex';
                video.className = 'video-zoom-in'; 
                video.currentTime = 0;
                video.play().catch(e => console.log("播放失敗:", e));
            };

            video.onended = function() {
                video.className = 'video-zoom-out';
                setTimeout(() => {
                    overlay.style.display = 'none';
                    video.className = ''; 
                    callback();
                }, 200);
            };

            video.onerror = function() {
                if (video.getAttribute('src')) {
                    console.log(fallbackAlertText); 
                    overlay.style.display = 'none';
                    callback();
                }
            };

            video.setAttribute('src', url);
            video.load();
        }

        function handleCellClick(r, c, isPlayer = true) {
            if (isGameOver) return; 
            if (isPlayer && currentTurn === 'b') return; 

            const clickedData = boardState[r][c];

            if (!selectedCell) {
                if (clickedData && clickedData.charAt(0) === currentTurn) {
                    selectedCell = { r, c }; renderBoard();
                }
                return;
            }

            const sr = selectedCell.r; const sc = selectedCell.c;
            const attackerPiece = boardState[sr][sc];
            const side = attackerPiece.charAt(0); const pieceType = attackerPiece.charAt(1);

            if (sr === r && sc === c) {
                selectedCell = null; renderBoard(); return;
            }

            if (clickedData && clickedData.charAt(0) === currentTurn) {
                selectedCell = { r, c }; renderBoard(); return;
            }

            if (!isValidMove(boardState, sr, sc, r, c, side, pieceType)) return; 

            let tempBoardValidation = JSON.parse(JSON.stringify(boardState));
            tempBoardValidation[r][c] = attackerPiece;
            tempBoardValidation[sr][sc] = '';
            
            if (isGeneralsFacing(tempBoardValidation)) {
                if (isPlayer) alert("規則限制：將帥不可直接碰面！"); 
                return;
            }

            const enemySide = currentTurn === 'r' ? 'b' : 'r';
            if (checkIsUnderAttack(tempBoardValidation, enemySide)) {
                if (isPlayer) alert("警告：您的主帥正受到攻擊，請先解除將軍狀態！");
                return;
            }

            const isCapture = clickedData !== '';
            let isDefenseSuccess = false;
            const defenderPiece = clickedData;

            if (isCapture) isDefenseSuccess = Math.random() < 0.5; 

            if (isCapture) {
                if (isDefenseSuccess) {
                    boardState[sr][sc] = '';
                    boardState[r][c] = defenderPiece; 
                } else {
                    boardState[sr][sc] = '';
                    boardState[r][c] = attackerPiece;
                }
            } else {
                boardState[sr][sc] = '';
                boardState[r][c] = attackerPiece;
            }
            
            selectedCell = null;

            const afterMoveFlow = () => {
                renderBoard();

                const isKingCaptured = isCapture && !isDefenseSuccess && (defenderPiece.charAt(1) === '帥' || defenderPiece.charAt(1) === '將');
                const isAttackingKingKilled = isCapture && isDefenseSuccess && (pieceType === '帥' || pieceType === '將');
                const isMyKingDoomed = checkIsUnderAttack(boardState, enemySide);

                if (isKingCaptured || isAttackingKingKilled || isMyKingDoomed) {
                    isGameOver = true;
                    let winnerText;
                    let reasonText = "";

                    if (isKingCaptured) {
                        winnerText = side === 'r' ? '紅方' : '黑方';
                    } else if (isAttackingKingKilled) {
                        winnerText = side === 'r' ? '黑方' : '紅方'; 
                        reasonText = "\n(主帥御駕親征失敗)";
                    } else if (isMyKingDoomed) {
                        winnerText = side === 'r' ? '黑方' : '紅方'; 
                        reasonText = "\n(解將失敗，主帥陣亡)";
                    }

                    const overOverlay = document.getElementById('game-over-overlay');
                    const textEl = document.getElementById('game-over-text');
                    textEl.innerText = `🏆 ${winnerText} 獲勝！${reasonText}`;
                    textEl.style.color = (winnerText === '紅方') ? '#c00' : '#000';
                    setTimeout(() => { overOverlay.style.display = 'flex'; }, 300);
                    return;
                }

                const noRedOffense = !hasOffensivePieces(boardState, 'r');
                const noBlackOffense = !hasOffensivePieces(boardState, 'b');

                if (noRedOffense || noBlackOffense) {
                    isGameOver = true;
                    let winnerText = noRedOffense ? '黑方' : '紅方';
                    const overOverlay = document.getElementById('game-over-overlay');
                    const textEl = document.getElementById('game-over-text');
                    textEl.innerText = `🏆 ${winnerText} 獲勝！\n(對手已喪失進攻能力)`;
                    textEl.style.color = (winnerText === '紅方') ? '#c00' : '#000';
                    setTimeout(() => { overOverlay.style.display = 'flex'; }, 300);
                    return;
                }

                const isCheck = checkIsUnderAttack(boardState, currentTurn);
                if (isCheck) {
                    const checkFilename = currentTurn === 'r' ? 'red_check.mp4' : 'black_check.mp4';
                    playVideo(checkFilename, `🚨 將軍！`, () => switchTurn());
                } else {
                    switchTurn();
                }
            };

            if (isCapture && isDefenseSuccess) {
                playGif('counter_kill.gif', 1300, `🛡️ 反殺！`, afterMoveFlow);
            } else {
                afterMoveFlow();
            }
        }

        function switchTurn() {
            currentTurn = currentTurn === 'r' ? 'b' : 'r';
            statusText.innerText = `目前輪到：${currentTurn === 'r' ? '紅方 (玩家)' : '黑方 (電腦)'}`;
            statusText.style.color = currentTurn === 'r' ? '#c00' : '#000';
            statusText.classList.remove('thinking');

            if (currentTurn === 'b' && !isGameOver) {
                setTimeout(playAITurn, 200); 
            }
        }

        renderBoard();
    </script>
</body>
</html>
